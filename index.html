<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliza Library</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    background:linear-gradient(135deg,#6bbf9a,#8fd3b8);
    color:white;
}

/* NAVBAR */
nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

nav h2{
    font-weight:600;
}

nav a{
    text-decoration:none;
    color:white;
    margin-left:25px;
    font-weight:500;
}

nav a:hover{
    border-bottom:2px solid white;
}

/* HERO */
.hero{
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:48px;
    margin-bottom:15px;
}

.hero p{
    font-size:18px;
    margin-bottom:40px;
}

.search-box{
    background:#eaf7f1;
    padding:40px;
    border-radius:25px;
    width:600px;
    max-width:90%;
    color:#2f5d4a;
}

.search-box input{
    width:70%;
    padding:12px;
    border-radius:20px;
    border:1px solid #6bbf9a;
    outline:none;
}

.search-box button{
    padding:12px 20px;
    border:none;
    background:#6bbf9a;
    color:white;
    border-radius:20px;
    cursor:pointer;
}

.search-box button:hover{
    background:#55a885;
}

.menu-btn{
    margin-top:25px;
}

.menu-btn a{
    display:inline-block;
    margin:8px;
    padding:10px 20px;
    border:1px solid #6bbf9a;
    border-radius:20px;
    text-decoration:none;
    color:#2f5d4a;
}

.menu-btn a:hover{
    background:#6bbf9a;
    color:white;
}

footer{
    text-align:center;
    padding:20px;
    font-size:14px;
}
</style>
</head>

<body>

<nav>
    <h2>Eliza Library</h2>
    <div>
        <a href="index.html">Beranda</a>
        <a href="cv.html">CV</a>
        <a href="media.html">Media</a>
    </div>
</nav>

<div class="hero">
    <h1>Welcome to Eliza Library</h1>
    <p>Ribuan Buku Siap untuk Kamu Baca!</p>

    <div class="search-box">
        <input type="text" placeholder="Masukkan kata kunci untuk mencari koleksi...">
        <button>Cari</button>

        <div class="menu-btn">
            <a href="cv.html">Profil Saya</a>
            <a href="media.html">Media Sosial</a>
        </div>
    </div>
</div>

<footer>
    © 2026 Eliza Library | Universitas Sumatera Utara
</footer>

</body>
</html>
